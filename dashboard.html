<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CarKart</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="navbar-placeholder"></div>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="dashboard-header" class="mb-12">
            <h1 class="text-4xl font-bold text-gray-900">My Dashboard</h1>
            <p class="text-gray-500 mt-2">Manage your listings, orders, and profile.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar Stats -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Quick Stats</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Active Listings</span>
                            <span id="stat-listings" class="font-bold text-blue-600">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Total Sales</span>
                            <span id="stat-sales" class="font-bold text-green-600">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Saved Cars</span>
                            <span id="stat-favorites" class="font-bold text-red-600">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-600 p-6 rounded-2xl shadow-lg text-white">
                    <h3 class="font-bold mb-2">Sell your car?</h3>
                    <p class="text-blue-100 text-sm mb-4">List your vehicle today and reach thousands of buyers.</p>
                    <a href="/add-car.html" class="block text-center bg-white text-blue-600 py-2 rounded-lg font-bold hover:bg-gray-100 transition">Add Listing</a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-3 space-y-12">
                <!-- Recent Activity / Orders -->
                <section>
                    <h2 class="text-2xl font-bold mb-6">Recent Transactions</h2>
                    <div id="orders-list" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-12 text-center text-gray-400">Loading transactions...</div>
                    </div>
                </section>

                <!-- My Recent Listings -->
                <section>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">My Listings</h2>
                        <a href="/my-listings.html" class="text-blue-600 font-semibold hover:underline">View All</a>
                    </div>
                    <div id="my-listings-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Listings loaded here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadComponent, formatCurrency, formatDate } from '/utils/helpers.js';
        import { db, auth } from '/js/firebase-config.js';
        import { collection, query, where, getDocs, orderBy, limit } from 'firebase/firestore';
        import { onAuthStateChanged } from 'firebase/auth';
        import { createCarCard } from '/js/marketplace.js';

        loadComponent('navbar', 'navbar-placeholder');
        loadComponent('footer', 'footer-placeholder');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/login.html';
            } else {
                loadDashboardData(user.uid);
            }
        });

        async function loadDashboardData(userId) {
            try {
                // Load Stats
                const listingsQuery = query(collection(db, 'cars'), where('sellerId', '==', userId));
                const listingsSnap = await getDocs(listingsQuery);
                document.getElementById('stat-listings').textContent = listingsSnap.size;

                const favoritesQuery = query(collection(db, 'favorites'), where('userId', '==', userId));
                const favoritesSnap = await getDocs(favoritesQuery);
                document.getElementById('stat-favorites').textContent = favoritesSnap.size;

                // Load Orders (as buyer or seller)
                const ordersQuery = query(
                    collection(db, 'orders'), 
                    where('buyerId', '==', userId),
                    orderBy('orderDate', 'desc'),
                    limit(5)
                );
                const ordersSnap = await getDocs(ordersQuery);
                renderOrders(ordersSnap);

                // Load My Listings
                const myCarsQuery = query(
                    collection(db, 'cars'), 
                    where('sellerId', '==', userId),
                    orderBy('createdAt', 'desc'),
                    limit(2)
                );
                const myCarsSnap = await getDocs(myCarsQuery);
                renderMyListings(myCarsSnap);

            } catch (error) {
                console.error(error);
            }
        }

        function renderOrders(snapshot) {
            const list = document.getElementById('orders-list');
            if (snapshot.empty) {
                list.innerHTML = '<div class="p-12 text-center text-gray-400">No transactions found.</div>';
                return;
            }

            let html = '<table class="w-full text-left"><thead class="bg-gray-50 border-b border-gray-100"><tr class="text-xs font-bold text-gray-400 uppercase tracking-wider"><th class="px-6 py-4">Order ID</th><th class="px-6 py-4">Date</th><th class="px-6 py-4">Amount</th><th class="px-6 py-4">Action</th></tr></thead><tbody class="divide-y divide-gray-100">';
            
            snapshot.forEach(doc => {
                const order = doc.data();
                html += `
                    <tr>
                        <td class="px-6 py-4 font-medium text-gray-900">#${doc.id.substr(0, 8)}</td>
                        <td class="px-6 py-4 text-gray-500">${formatDate(order.orderDate?.toDate())}</td>
                        <td class="px-6 py-4 font-bold text-blue-600">${formatCurrency(order.price)}</td>
                        <td class="px-6 py-4"><a href="/invoice.html?orderId=${doc.id}" class="text-blue-600 hover:underline">Invoice</a></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            list.innerHTML = html;
        }

        function renderMyListings(snapshot) {
            const grid = document.getElementById('my-listings-grid');
            if (snapshot.empty) {
                grid.innerHTML = '<p class="text-gray-500">You haven\'t listed any cars yet.</p>';
                return;
            }

            grid.innerHTML = '';
            snapshot.forEach(doc => {
                grid.appendChild(createCarCard(doc.id, doc.data()));
            });
        }
    </script>
</body>
</html>
