<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings - CarKart</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="navbar-placeholder"></div>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold text-gray-900">My Listings</h1>
                <p class="text-gray-500 mt-2">Manage your car advertisements.</p>
            </div>
            <a href="/add-car.html" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Add New Listing</a>
        </div>

        <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Listings loaded here -->
            <div class="animate-pulse bg-white rounded-xl h-80"></div>
            <div class="animate-pulse bg-white rounded-xl h-80"></div>
            <div class="animate-pulse bg-white rounded-xl h-80"></div>
            <div class="animate-pulse bg-white rounded-xl h-80"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadComponent, showToast } from '/utils/helpers.js';
        import { db, auth } from '/js/firebase-config.js';
        import { collection, query, where, getDocs, orderBy, deleteDoc, doc } from 'firebase/firestore';
        import { onAuthStateChanged } from 'firebase/auth';
        import { createCarCard } from '/js/marketplace.js';

        loadComponent('navbar', 'navbar-placeholder');
        loadComponent('footer', 'footer-placeholder');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/login.html';
            } else {
                loadMyListings(user.uid);
            }
        });

        async function loadMyListings(userId) {
            const grid = document.getElementById('listings-grid');
            try {
                const q = query(
                    collection(db, 'cars'), 
                    where('sellerId', '==', userId),
                    orderBy('createdAt', 'desc')
                );
                const snapshot = await getDocs(q);
                
                grid.innerHTML = '';
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full py-24 text-center"><p class="text-gray-500 text-xl">You haven\'t listed any cars yet.</p><a href="/add-car.html" class="text-blue-600 font-bold mt-4 inline-block">Start Selling Now &rarr;</a></div>';
                    return;
                }

                snapshot.forEach(docSnap => {
                    const car = docSnap.data();
                    const card = createCarCard(docSnap.id, car);
                    
                    // Add status badge and management buttons
                    const statusColor = car.status === 'approved' ? 'bg-green-100 text-green-700' : 
                                      car.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 
                                      'bg-red-100 text-red-700';
                    
                    const managementDiv = document.createElement('div');
                    managementDiv.className = 'p-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center';
                    managementDiv.innerHTML = `
                        <span class="px-2 py-1 rounded text-xs font-bold uppercase ${statusColor}">${car.status}</span>
                        <div class="flex space-x-2">
                            <button class="text-red-600 hover:text-red-800 text-sm font-bold delete-btn" data-id="${docSnap.id}">Delete</button>
                        </div>
                    `;
                    card.appendChild(managementDiv);
                    grid.appendChild(card);
                });

                // Add delete listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if (confirm('Are you sure you want to delete this listing?')) {
                            const id = e.target.dataset.id;
                            try {
                                await deleteDoc(doc(db, 'cars', id));
                                showToast('Listing deleted successfully', 'success');
                                loadMyListings(userId);
                            } catch (error) {
                                showToast(error.message, 'error');
                            }
                        }
                    });
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p class="col-span-full text-center text-red-500">Error loading listings.</p>';
            }
        }
    </script>
</body>
</html>
