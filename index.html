<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarKart - Second Hand Car Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="navbar-placeholder"></div>

    <main>
        <!-- Hero Section -->
        <section class="relative h-[500px] flex items-center justify-center text-white">
            <div class="absolute inset-0 bg-black/50 z-10"></div>
            <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920" alt="Hero" class="absolute inset-0 w-full h-full object-cover" referrerPolicy="no-referrer">
            <div class="relative z-20 text-center px-4">
                <h1 class="text-5xl font-bold mb-4">Buy & Sell Second Hand Cars</h1>
                <p class="text-xl mb-8">The most trusted marketplace for pre-owned vehicles</p>
                <div class="flex flex-wrap justify-center gap-4">
                    <a href="/browse.html" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-semibold transition">Browse Cars</a>
                    <a href="/add-car.html" class="bg-white hover:bg-gray-100 text-blue-600 px-8 py-3 rounded-lg font-semibold transition">Sell Your Car</a>
                </div>
            </div>
        </section>

        <!-- Featured Brands -->
        <section class="max-w-7xl mx-auto py-16 px-4">
            <h2 class="text-3xl font-bold text-center mb-12">Popular Brands</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
                <!-- Brand items -->
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/toyota-logo.png" alt="Toyota" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">Toyota</span>
                </div>
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/honda-logo.png" alt="Honda" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">Honda</span>
                </div>
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/ford-logo.png" alt="Ford" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">Ford</span>
                </div>
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/bmw-logo.png" alt="BMW" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">BMW</span>
                </div>
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/mercedes-benz-logo.png" alt="Mercedes" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">Mercedes</span>
                </div>
                <div class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer">
                    <img src="https://www.carlogos.org/car-logos/audi-logo.png" alt="Audi" class="h-12 object-contain mb-2" referrerPolicy="no-referrer">
                    <span class="font-medium">Audi</span>
                </div>
            </div>
        </section>

        <!-- Recent Listings -->
        <section class="bg-gray-100 py-16 px-4">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold">Recent Listings</h2>
                    <a href="/browse.html" class="text-blue-600 font-semibold hover:underline">View All</a>
                </div>
                <div id="recent-listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Listings will be loaded here via JS -->
                    <div class="animate-pulse bg-white rounded-xl h-80"></div>
                    <div class="animate-pulse bg-white rounded-xl h-80"></div>
                    <div class="animate-pulse bg-white rounded-xl h-80"></div>
                    <div class="animate-pulse bg-white rounded-xl h-80"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="/js/firebase-config.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/marketplace.js"></script>
    <script type="module">
        import { loadComponent } from '/utils/helpers.js';
        loadComponent('navbar', 'navbar-placeholder');
        loadComponent('footer', 'footer-placeholder');
    </script>
</body>
</html>
