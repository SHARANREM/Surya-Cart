<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CarKart</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <div id="navbar-placeholder"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
                <p class="text-gray-500 mt-2">Join the CarKart marketplace</p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">I want to</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center justify-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition peer-checked:bg-blue-50 peer-checked:border-blue-500">
                            <input type="radio" name="role" value="buyer" checked class="hidden peer">
                            <span class="text-sm font-medium">Buy Cars</span>
                        </label>
                        <label class="flex items-center justify-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                            <input type="radio" name="role" value="seller" class="hidden peer">
                            <span class="text-sm font-medium">Sell Cars</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-200 mt-4">Register</button>
            </form>

            <p class="text-center mt-8 text-gray-600">
                Already have an account? <a href="/login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { handleRegister } from '/js/auth.js';
        import { loadComponent } from '/utils/helpers.js';
        
        loadComponent('navbar', 'navbar-placeholder');
        loadComponent('footer', 'footer-placeholder');

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            handleRegister(name, email, password, role);
        });
    </script>
</body>
</html>
