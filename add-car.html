<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Your Car - CarKart</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <div id="navbar-placeholder"></div>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12">
            <div class="mb-10">
                <h1 class="text-3xl font-bold text-gray-900">List Your Car for Sale</h1>
                <p class="text-gray-500 mt-2">Fill in the details below to reach thousands of potential buyers.</p>
            </div>

            <form id="add-car-form" class="space-y-8">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Listing Title</label>
                        <input type="text" id="title" required
                            placeholder="e.g. 2020 Toyota Camry - Excellent Condition"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Brand</label>
                        <select id="brand" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="">Select Brand</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Honda">Honda</option>
                            <option value="Ford">Ford</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes">Mercedes</option>
                            <option value="Audi">Audi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Model</label>
                        <input type="text" id="model" required placeholder="e.g. Camry"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Year</label>
                        <input type="number" id="year" required min="1900" max="2026"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Price (₹)</label>
                        <input type="number" id="price" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <!-- Specs -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Fuel Type</label>
                        <select id="fuelType" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Electric">Electric</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Transmission</label>
                        <select id="transmission" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="Manual">Manual</option>
                            <option value="Automatic">Automatic</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">KM Driven</label>
                        <input type="number" id="kilometersDriven" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <!-- Location & Description -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Location</label>
                        <input type="text" id="location" required placeholder="e.g. Mumbai, Maharashtra"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                        <textarea id="description" rows="4" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="Tell buyers more about your car..."></textarea>
                    </div>
                </div>

                <!-- Brand Image Preview -->
                <div class="bg-gray-100 rounded-xl p-4 flex flex-col items-center">
                    <label class="block text-sm font-semibold text-gray-700 mb-3 text-center w-full">Car Image Preview
                        (Based on Brand)</label>
                    <div class="w-full max-w-md h-48 rounded-lg overflow-hidden border bg-white">
                        <img id="brand-preview" src="/assets/car-images/default.jpg" class="w-full h-full object-cover"
                            alt="Preview">
                    </div>
                    <p class="text-xs text-gray-500 mt-2 italic">* Image is automatically assigned based on the brand
                        you select.</p>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200">Post
                    Listing for Approval</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadComponent, showToast } from '/utils/helpers.js';
        import { auth, db } from '/js/firebase-config.js';
        import { collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { onAuthStateChanged } from 'firebase/auth';
        import { getCarImage } from '/utils/carImages.js';

        loadComponent('navbar', 'navbar-placeholder');
        loadComponent('footer', 'footer-placeholder');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/login.html';
            }
        });

        const brandSelect = document.getElementById('brand');
        const previewImg = document.getElementById('brand-preview');

        brandSelect.addEventListener('change', (e) => {
            previewImg.src = getCarImage(e.target.value);
        });

        document.getElementById('add-car-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Listing...';

            try {
                const user = auth.currentUser;
                if (!user) throw new Error('You must be logged in');

                const carData = {
                    title: document.getElementById('title').value,
                    brand: document.getElementById('brand').value,
                    model: document.getElementById('model').value,
                    year: parseInt(document.getElementById('year').value),
                    price: parseFloat(document.getElementById('price').value),
                    fuelType: document.getElementById('fuelType').value,
                    transmission: document.getElementById('transmission').value,
                    kilometersDriven: parseInt(document.getElementById('kilometersDriven').value),
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value,
                    sellerId: user.uid,
                    status: 'pending',
                    createdAt: serverTimestamp()
                };

                await addDoc(collection(db, 'cars'), carData);
                showToast('Car listed successfully! Waiting for admin approval.', 'success');
                setTimeout(() => window.location.href = '/my-listings.html', 2000);
            } catch (error) {
                showToast(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Post Listing for Approval';
            }
        });
    </script>
</body>

</html>
